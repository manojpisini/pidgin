<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>pidgin // protocol sim</title>
<style>
  :root {
    --bg: #000000; --panel: #050505; --border: #0a0a0a;
    --accent: #00ff41; --green: #00ff41; --red: #ff0040; --yellow: #ffae00; --purple: #b400ff; --blue: #0070ff; --cyan: #00e5ff;
    --dim: #1a1a1a; --text: #2a2a2a; --bright: #3a3a3a; --white: #e0e0e0;
    --glow: 0 0 4px rgba(0,255,65,0.3);
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family: 'SF Mono','Fira Code','Cascadia Code','Courier New',monospace; background:var(--bg); color:var(--text); height:100vh; overflow:hidden; }

  .grid {
    display: grid;
    grid-template-columns: 280px 1fr 1fr;
    grid-template-rows: 32px 1fr 1fr 140px;
    gap: 1px;
    background: var(--border);
    height: 100vh;
  }
  .grid > * { background: var(--panel); }

  /* Header */
  .hdr { grid-column:1/-1; display:flex; align-items:center; padding:0 12px; gap:12px; border-bottom:1px solid var(--border); }
  .hdr .blink { width:5px; height:5px; border-radius:50%; background:var(--green); animation:bk 1.5s infinite; }
  @keyframes bk { 0%,100%{opacity:1}50%{opacity:.15} }
  .hdr .title { font-size:11px; color:var(--green); letter-spacing:2px; text-transform:uppercase; }
  .hdr .sep { color:var(--dim); }
  .hdr .info { font-size:10px; color:var(--dim); }
  .hdr .info b { color:var(--text); font-weight:400; }
  .hdr .right { margin-left:auto; display:flex; gap:16px; }

  /* Panels */
  .panel { padding:8px 10px; display:flex; flex-direction:column; overflow:hidden; }
  .ptitle { font-size:8px; color:var(--dim); text-transform:uppercase; letter-spacing:2px; margin-bottom:6px; padding-bottom:4px; border-bottom:1px solid var(--border); display:flex; align-items:center; gap:6px; }
  .ptitle::before { content:''; width:3px; height:3px; }
  .ptitle.c::before { background:var(--green); }
  .ptitle.p::before { background:var(--purple); }
  .ptitle.y::before { background:var(--yellow); }
  .ptitle.r::before { background:var(--red); }
  .ptitle.b::before { background:var(--blue); }

  /* Pipeline */
  #pipeline { grid-column:1; grid-row:2/4; overflow-y:auto; }
  .stg { display:flex; align-items:center; gap:6px; padding:5px 8px; margin-bottom:1px; font-size:10px; border-left:2px solid transparent; }
  .stg.idle { border-left-color:var(--dim); }
  .stg.run { border-left-color:var(--accent); background:rgba(0,255,65,0.03); }
  .stg.pass { border-left-color:var(--green); }
  .stg.fail { border-left-color:var(--red); }
  .stg .n { color:var(--dim); width:16px; }
  .stg .nm { color:var(--bright); width:60px; }
  .stg .inf { color:var(--dim); font-size:9px; margin-left:auto; }
  .stg .bar { position:absolute; bottom:0; left:0; height:1px; background:var(--accent); transition:width .2s; }

  /* Chat Comms */
  #chat { grid-column:2/4; grid-row:2/4; overflow:hidden; }
  .chat-scroll { height:100%; overflow-y:auto; padding-bottom:4px; }
  .msg { margin-bottom:2px; display:flex; gap:8px; align-items:flex-start; padding:3px 6px; }
  .msg .ts { color:var(--dim); font-size:9px; flex-shrink:0; width:56px; }
  .msg .src { font-size:9px; flex-shrink:0; padding:1px 4px; border-radius:2px; text-transform:uppercase; font-weight:600; letter-spacing:1px; }
  .msg .src.sys { background:#0a0a0a; color:var(--green); border:1px solid #0f0f0f; }
  .msg .src.ag { background:#0a000a; color:var(--purple); border:1px solid #0f000f; }
  .msg .src.srv { background:#000a0a; color:var(--cyan); border:1px solid #000f0f; }
  .msg .src.err { background:#0a0000; color:var(--red); border:1px solid #0f0000; }
  .msg .body { color:var(--text); font-size:10px; line-height:1.4; word-break:break-all; }
  .msg .body .enc { color:var(--green); opacity:.6; }
  .msg .body .key { color:var(--yellow); }
  .msg .body .addr { color:var(--cyan); }
  .msg .body .pkt { color:var(--purple); }
  .msg .body .ok { color:var(--green); }
  .msg .body .no { color:var(--red); }
  .msg .body .warn { color:var(--yellow); }
  .msg .hdr-line { color:var(--dim); font-size:9px; padding:2px 6px; }
  .msg .hex { color:var(--dim); font-size:9px; opacity:.4; }

  /* Inspector */
  #inspector { grid-column:1; grid-row:4; overflow:hidden; display:flex; flex-direction:column; }
  .insp-cols { flex:1; display:flex; gap:1px; background:var(--border); overflow:hidden; }
  .insp-col { flex:1; background:var(--panel); padding:6px; overflow-y:auto; }
  .insp-col .ct { font-size:8px; color:var(--dim); text-transform:uppercase; letter-spacing:1.5px; margin-bottom:4px; }
  .insp-col pre { font-size:10px; color:var(--text); line-height:1.4; white-space:pre-wrap; word-break:break-all; }

  /* Input */
  #input { grid-column:2; grid-row:4; padding:8px 10px; display:flex; flex-direction:column; gap:6px; }
  #input textarea { flex:1; width:100%; background:var(--panel); border:1px solid var(--border); color:var(--green); font-family:inherit; font-size:10px; padding:6px; resize:none; outline:none; }
  #input textarea:focus { border-color:var(--accent); }
  #input .btn-row { display:flex; gap:4px; }
  #input button { padding:4px 10px; border:none; background:var(--border); color:var(--text); font-family:inherit; font-size:10px; cursor:pointer; }
  #input button:hover { background:var(--accent); color:#000; }
  #input button.act { background:var(--accent); color:#000; }

  /* Stats */
  #stats { grid-column:3; grid-row:4; padding:8px 10px; }
  .stat-row { display:flex; justify-content:space-between; font-size:10px; padding:2px 0; border-bottom:1px solid var(--border); }
  .stat-row .k { color:var(--dim); }
  .stat-row .v { color:var(--text); }
  .stat-row .v.ok { color:var(--green); }
  .stat-row .v.no { color:var(--red); }

  ::-webkit-scrollbar { width:3px; }
  ::-webkit-scrollbar-track { background:transparent; }
  ::-webkit-scrollbar-thumb { background:var(--dim); }
</style>
</head>
<body>
<div class="grid">
  <!-- Header -->
  <div class="hdr">
    <div class="blink"></div>
    <span class="title">pidgin</span>
    <span class="sep">/</span>
    <span class="info">v0.2.0</span>
    <div class="right">
      <span class="info"><b>host</b> <span id="hHost">--</span></span>
      <span class="info"><b>uptime</b> <span id="hUp">0</span></span>
      <span class="info"><b>pkts</b> <span id="hPkts">0</span></span>
      <span class="info"><b>blocks</b> <span id="hBlocks">0</span></span>
      <span class="info" id="hSt" style="color:var(--green)">ONLINE</span>
    </div>
  </div>

  <!-- Pipeline -->
  <div class="panel" id="pipeline">
    <div class="ptitle c">pipeline</div>
    <div id="stages"></div>
  </div>

  <!-- Chat Comms -->
  <div class="panel" id="chat">
    <div class="ptitle p">encrypted comms</div>
    <div class="chat-scroll" id="chatScroll"></div>
  </div>

  <!-- Inspector -->
  <div class="panel" id="inspector">
    <div class="ptitle y">packet</div>
    <div class="insp-cols">
      <div class="insp-col"><div class="ct">raw .pgn</div><pre id="rawPgn">--</pre></div>
      <div class="insp-col"><div class="ct">expanded</div><pre id="expPgn">--</pre></div>
    </div>
  </div>

  <!-- Input -->
  <div class="panel" id="input">
    <textarea id="pktIn" spellcheck="false">@run code.review
wf=generic_review
mode=draft
in=[main.rs]
out=[review]
do=[draft,review]
deny=[publish,send,delete,secrets]
risk=med
human=yes</textarea>
    <div class="btn-row">
      <button class="act" onclick="sim()">TRANSMIT</button>
      <button onclick="reset()">CLR</button>
      <button onclick="ex('safe')">safe</button>
      <button onclick="ex('unsafe')">unsf</button>
      <button onclick="ex('crit')">crit</button>
      <button onclick="ex('trav')">trav</button>
    </div>
  </div>

  <!-- Stats -->
  <div class="panel" id="stats">
    <div class="ptitle b">telemetry</div>
    <div class="stat-row"><span class="k">packets</span><span class="v" id="sPkts">0</span></div>
    <div class="stat-row"><span class="k">passed</span><span class="v ok" id="sPass">0</span></div>
    <div class="stat-row"><span class="k">blocked</span><span class="v no" id="sBlock">0</span></div>
    <div class="stat-row"><span class="k">safety rules</span><span class="v" id="sRules">0</span></div>
    <div class="stat-row"><span class="k">refs resolved</span><span class="v" id="sRes">0</span></div>
    <div class="stat-row"><span class="k">refs failed</span><span class="v no" id="sResF">0</span></div>
    <div class="stat-row"><span class="k">latency</span><span class="v" id="sLat">--</span></div>
    <div class="stat-row"><span class="k">bytes recv</span><span class="v" id="sBytes">0</span></div>
    <div class="stat-row"><span class="k">bytes sent</span><span class="v" id="sBytesR">0</span></div>
  </div>
</div>

<script>
const $=id=>document.getElementById(id);
let pkts=0,passed=0,blocks=0,rulesFired=0,refsOk=0,refsFail=0;
let startTime=Date.now();
let busy=false;

const EX={
  safe:`@run code.review\nwf=generic_review\nmode=draft\nin=[main.rs]\nout=[review]\ndo=[draft,review]\ndeny=[publish,send,delete,secrets]\nrisk=med\nhuman=yes`,
  unsafe:`@run publish.post\nwf=generic_draft_and_distribute\nmode=approval\nin=[draft]\nout=[result]\ndo=[publish,send]\ndeny=[publish,send]\nrisk=med\nhuman=yes`,
  crit:`@run deploy.prod\nwf=generic_review\nmode=approval\nin=[deploy_config]\nout=[result]\ndo=[publish,delete]\ndeny=[]\nrisk=crit\nhuman=no`,
  trav:`@run secret.read\nwf=generic_review\nmode=draft\nin=[file:.env,file:../../../etc/passwd]\nout=[notes]\ndo=[read]\ndeny=[]\nrisk=low\nhuman=no`
};
function ex(k){$('pktIn').value=EX[k]}

// Timestamps
function ts(){
  const n=new Date();
  return [n.getHours(),n.getMinutes(),n.getSeconds(),n.getMilliseconds()]
    .map((v,i)=>i===3?String(v).padStart(3,'0'):String(v).padStart(2,'0'))
    .join(':');
}

// Uptime
setInterval(()=>{
  const s=Math.floor((Date.now()-startTime)/1000);
  const m=Math.floor(s/60),h=Math.floor(m/60);
  $('hUp').textContent=h>0?`${h}h${m%60}m`:m>0?`${m}m${s%60}s`:`${s}s`;
},1000);

// Health
async function health(){
  try{const r=await fetch('/api/v1/health');const d=await r.json();$('hHost').textContent=d.data.host.split('\\').pop()}
  catch{$('hHost').textContent='--';$('hSt').textContent='OFFLINE';$('hSt').style.color='var(--red)'}
}
health();

// Pipeline
const STAGES=['LEXER','PARSER','SYNTAX','SCHEMA','SAFETY','RESOLVE','EXPAND'];
function initPipeline(){
  $('stages').innerHTML='';
  STAGES.forEach((s,i)=>{
    const d=document.createElement('div');
    d.className='stg idle';
    d.id='st'+i;
    d.innerHTML=`<span class="n">${String(i+1).padStart(2,'0')}</span><span class="nm">${s}</span><span class="inf">idle</span>`;
    $('stages').appendChild(d);
  });
}
initPipeline();

function setSt(i,state,info){
  const el=$('st'+i);
  el.className='stg '+state;
  el.querySelector('.inf').textContent=info||state;
}

// Chat
function chat(type,src,cls,msg){
  const d=document.createElement('div');
  d.className='msg';
  d.innerHTML=`<span class="ts">${ts()}</span><span class="src ${cls}">${src}</span><span class="body">${msg}</span>`;
  $('chatScroll').appendChild(d);
  $('chatScroll').scrollTop=$('chatScroll').scrollHeight;
}
function chatEnc(src,cls,hex,plain){
  const d=document.createElement('div');
  d.className='msg';
  d.innerHTML=`<span class="ts">${ts()}</span><span class="src ${cls}">${src}</span><span class="body"><span class="enc">${hex}</span> <span class="key">&gt;</span> <span class="pkt">${plain}</span></span>`;
  $('chatScroll').appendChild(d);
  $('chatScroll').scrollTop=$('chatScroll').scrollHeight;
}
function chatHdr(msg){
  const d=document.createElement('div');
  d.className='hdr-line';
  d.textContent='─'.repeat(20)+' '+msg+' ─'.repeat(20);
  $('chatScroll').appendChild(d);
  $('chatScroll').scrollTop=$('chatScroll').scrollHeight;
}

// Stats
function upStats(){
  $('sPkts').textContent=pkts;
  $('sPass').textContent=passed;
  $('sBlock').textContent=blocks;
  $('sRules').textContent=rulesFired;
  $('sRes').textContent=refsOk;
  $('sResF').textContent=refsFail;
  $('hPkts').textContent=pkts;
  $('hBlocks').textContent=blocks;
}

// Hex generator
function hexStr(s){return[...s].map(c=>c.charCodeAt(0).toString(16).padStart(2,'0')).join(' ')}

async function api(ep,body){
  try{const r=await fetch('/api/v1/'+ep,{method:'POST',headers:{'Content-Type':'text/plain'},body});return await r.json()}
  catch(e){return{ok:false,error:e.message}}
}

async function sim(){
  if(busy)return;
  busy=true;
  const pgn=$('pktIn').value;
  pkts++;
  upStats();

  const t0=performance.now();

  chatHdr('SESSION START');
  chat('sys','SYS','sys',`<span class="addr">0x${Math.random().toString(16).slice(2,10)}</span> new packet incoming`);

  // Input echo
  const lines=pgn.split('\n');
  chatEnc('AGENT','ag',hexStr(lines[0]),lines[0]);
  await delay(80);

  // Pipeline
  for(let i=0;i<7;i++){
    setSt(i,'run','processing');
    await delay(100+Math.random()*150);
  }

  // Parse
  const pr=await api('parse',pgn);
  if(pr.ok){
    setSt(0,'pass',`dir=${pr.data.directive}`);
    setSt(1,'pass',`id=${pr.data.run_id.slice(0,16)}`);
    chat('sys','SRV','srv',`<span class="ok">PARSE_OK</span> directive=<span class="pkt">${pr.data.directive}</span> run_id=<span class="addr">${pr.data.run_id}</span>`);
  }else{
    setSt(0,'fail','err');setSt(1,'fail','err');
    chat('sys','ERR','err',`<span class="no">PARSE_FAIL</span> ${pr.error}`);
    blocks++;upStats();busy=false;return;
  }
  await delay(60);

  // Validate
  const vr=await api('validate',pgn);
  if(vr.ok&&vr.data.length===0){
    setSt(2,'pass','0 errors');
    chat('sys','SRV','srv',`<span class="ok">VALIDATE_OK</span> schema=PASS fields=9`);
  }else{
    setSt(2,'fail',`${vr.data.length} err`);
    chat('sys','SRV','srv',`<span class="no">VALIDATE_FAIL</span> ${vr.data.length} errors`);
    vr.data.forEach(e=>chat('sys','SRV','srv',`  <span class="no">${e.code}</span> ${e.message}`));
    blocks++;upStats();busy=false;return;
  }
  await delay(60);

  // Schema
  setSt(3,'pass','ok');
  chat('sys','SRV','srv',`<span class="ok">SCHEMA_OK</span> wf=<span class="key">generic_review</span> risk=<span class="warn">${(pgn.match(/risk=(\w+)/)||[])[1]||'?'}</span> human=<span class="pkt">${(pgn.match(/human=(\w+)/)||[])[1]||'?'}</span>`);
  await delay(60);

  // Check (safety + resolve)
  const cr=await api('check',pgn);
  if(cr.ok){
    const s=cr.data.safety;
    const res=cr.data.resolution;
    if(s.blocked){
      setSt(4,'fail',`BLOCKED`);
      chat('sys','SRV','srv',`<span class="no">SAFETY_BLOCK</span> rules fired: ${s.fired_rules.map(r=>`<span class="key">${r}</span>`).join(', ')}`);
      blocks++;rulesFired+=s.fired_rules.length;
    }else{
      setSt(4,'pass',`${s.fired_rules.length} rules`);
      chat('sys','SRV','srv',`<span class="ok">SAFETY_PASS</span> ${s.fired_rules.length} rules evaluated`);
      rulesFired+=s.fired_rules.length;
    }
    if(s.human_required) chat('sys','SRV','srv',`<span class="warn">HUMAN_REQUIRED</span> manual approval gate`);

    const ok=res.filter(r=>r.status==='RESOLVED');
    const bad=res.filter(r=>r.status!=='RESOLVED');
    refsOk+=ok.length;refsFail+=bad.length;
    setSt(5,bad.length===0?'pass':'fail',`${ok.length}r/${bad.length}u`);
    if(ok.length>0) chat('sys','SRV','srv',`<span class="ok">RESOLVED</span> ${ok.map(r=>`<span class="addr">${r.original}</span>`).join(', ')}`);
    bad.forEach(r=>chat('sys','SRV','srv',`<span class="no">UNRESOLVED</span> <span class="addr">${r.original}</span> status=${r.status}`));
  }else{
    setSt(4,'fail','err');setSt(5,'fail','err');
    chat('sys','ERR','err',`<span class="no">CHECK_FAIL</span> ${cr.error}`);
    blocks++;upStats();busy=false;return;
  }
  await delay(60);

  // Expand
  const er=await api('expand',pgn);
  if(er.ok){
    setSt(6,'pass','done');
    $('rawPgn').textContent=pgn;
    $('expPgn').textContent=er.data.yaml;
    chat('sys','SRV','srv',`<span class="ok">EXPAND_OK</span> route=<span class="addr">${er.data.route.match(/executor: (\w+)/)?.[1]||'?'}</span> ttl=24h`);
    chatEnc('SRV','srv',hexStr(er.data.route.slice(0,40)),er.data.route.slice(0,60)+'...');
    passed++;
  }else{
    setSt(6,'fail','err');
    chat('sys','ERR','err',`<span class="no">EXPAND_FAIL</span> ${er.error}`);
    blocks++;
  }

  const lat=(performance.now()-t0).toFixed(0);
  $('sLat').textContent=lat+'ms';
  $('sBytes').textContent=(pgn.length*2)+'b';
  $('sBytesR').textContent=er.ok?(er.data.yaml.length*2)+'b':'0b';

  chatHdr('SESSION END');
  upStats();
  busy=false;
}

function reset(){
  busy=false;
  initPipeline();
  $('chatScroll').innerHTML='';
  $('rawPgn').textContent='--';
  $('expPgn').textContent='--';
  pkts=passed=blocks=rulesFired=refsOk=refsFail=0;
  upStats();
  $('sLat').textContent='--';
  $('sBytes').textContent='0';
  $('sBytesR').textContent='0';
  chat('sys','SYS','sys','session cleared');
}

function delay(ms){return new Promise(r=>setTimeout(r,ms))}
</script>
</body>
</html>
