<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>PIDGIN // Dashboard</title>
<style>
:root{--bg:#040708;--panel:#080c0e;--line:#2b373c;--green:#72f238;--cyan:#24d7ed;--amber:#ffb000;--red:#ff4b34;--muted:#84908b;--font:"JetBrainsMono Nerd Font","JetBrains Mono NF",Consolas,monospace}
*{box-sizing:border-box}
html,body{margin:0;width:100%;height:100%;background:#020405;color:#d8dfdc;font-family:var(--font);overflow:hidden}
body{display:grid;grid-template-rows:48px 1fr;min-height:100vh}
button{font:inherit;cursor:pointer}

/* top bar */
.top{display:grid;grid-template-columns:auto 1fr auto;align-items:center;border-bottom:1px solid var(--line);background:#040708;padding:0 14px;gap:12px;white-space:nowrap}
.top-brand{font-size:22px;letter-spacing:2px}
.top-brand small{font-size:12px;color:#bdd7af;margin-left:10px}
.top-info{display:flex;gap:18px;font-size:10px;color:#b5bdb9;justify-self:end}
.top-info .live{color:var(--green);display:flex;align-items:center;gap:4px}
.top-info .live::before{content:"";width:6px;height:6px;border-radius:50%;background:var(--green);box-shadow:0 0 6px var(--green)}

/* main grid */
.main{display:grid;grid-template-columns:1fr 1fr;grid-template-rows:auto 1fr;gap:6px;padding:6px;overflow:hidden}

/* panels */
.panel{border:1px solid var(--line);background:linear-gradient(180deg,#0a0e10,#070a0c);min-width:0;min-height:0;overflow:hidden;display:grid;grid-template-rows:32px 1fr}
.panel-h{height:32px;border-bottom:1px solid var(--line);display:flex;align-items:center;padding:0 10px;font-size:10px;letter-spacing:.35px;background:linear-gradient(180deg,#0a0f11,#080c0e);color:#c0c9c5}
.panel-h .live{font-size:8px;color:var(--green);margin-left:8px}
.panel-h .live::before{content:"";display:inline-block;width:5px;height:5px;border-radius:50%;background:var(--green);margin-right:4px;vertical-align:middle}

/* status panel */
.status{grid-column:1/-1;grid-template-rows:32px auto;border-color:var(--line)}
.status-body{display:grid;grid-template-columns:repeat(5,1fr);padding:0}
.stat{border-right:1px solid var(--line);padding:10px;text-align:center}
.stat:last-child{border-right:0}
.stat span{font-size:8px;color:#89948f;display:block}
.stat b{font-size:20px;color:#e1e6e4;display:block;margin-top:2px}

/* pipeline stages */
.stage{display:grid;grid-template-columns:24px 1fr auto auto;align-items:center;gap:6px;padding:6px 10px;border-bottom:1px solid rgba(43,55,60,.4);font-size:10px}
.stage:last-child{border-bottom:0}
.stage-num{width:18px;height:18px;border:1px solid #8a9490;border-radius:50%;display:grid;place-items:center;font-size:8px}
.stage.ok .stage-num{border-color:var(--green);color:var(--green)}
.stage .count{color:var(--muted);font-size:9px}

/* logs */
.logs-body{overflow-y:auto;padding:6px 8px;font-size:9px;line-height:1.6;scrollbar-width:thin;scrollbar-color:#314047 #080c0e}
.log-line{cursor:pointer;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;padding:1px 0}
.log-line:hover{background:#0c1113}
.ts{color:#78837e}.level-inf{color:var(--green)}.level-wrn{color:var(--amber)}.level-err{color:var(--red)}
</style>
</head>
<body>

<header class="top">
  <div class="top-brand">PIDGIN <small>// Control Plane</small></div>
  <div></div>
  <div class="top-info">
    <span class="live" id="liveIndicator">LIVE</span>
    <span>UP <span id="uptime">--</span></span>
    <span>PKTS <span id="pktTotal" style="color:var(--green)">--</span></span>
    <span>BLOCKED <span id="pktBlocked" style="color:var(--red)">--</span></span>
  </div>
</header>

<div class="main">

<div class="panel status">
  <div class="panel-h">STATUS</div>
  <div class="status-body">
    <div class="stat"><span>PACKETS</span><b id="sPackets">--</b></div>
    <div class="stat"><span>BLOCKED</span><b id="sBlocked" style="color:var(--red)">--</b></div>
    <div class="stat"><span>COMPLETED</span><b id="sCompleted" style="color:var(--green)">--</b></div>
    <div class="stat"><span>PKT / SEC</span><b id="sPps">--</b></div>
    <div class="stat"><span>ERROR RATE</span><b id="sErrRate">--</b></div>
  </div>
</div>

<div class="panel">
  <div class="panel-h">PIPELINE <span class="live">LIVE</span></div>
  <div id="stages"></div>
</div>

<div class="panel">
  <div class="panel-h">LIVE LOGS <span class="live">STREAMING</span></div>
  <div class="logs-body" id="logs"></div>
</div>

</div>

<script>
const API = '/api/v1/';

function fmt(n){return n.toLocaleString()}
function fmtUptime(s){const m=Math.floor(s/60),h=Math.floor(m/60);return [h,m%60,s%60].map(v=>String(v).padStart(2,'0')).join(':')}

function applyStatus(d){
  if(!d)return;
  document.getElementById('uptime').textContent = fmtUptime(d.uptime);
  document.getElementById('pktTotal').textContent = fmt(d.packets);
  document.getElementById('pktBlocked').textContent = fmt(d.blocked);
  document.getElementById('sPackets').textContent = fmt(d.packets);
  document.getElementById('sBlocked').textContent = fmt(d.blocked);
  document.getElementById('sCompleted').textContent = fmt(d.packets - d.blocked);
  document.getElementById('sPps').textContent = d.packets_per_sec.toFixed(2);
  document.getElementById('sErrRate').textContent = d.error_rate.toFixed(1)+'%';
}

function applyPipeline(d){
  if(!d)return;
  document.getElementById('stages').innerHTML = d.stages.map((s,i) =>
    '<div class="stage'+(s.status==='OK'?' ok':'')+'">'+
    '<div class="stage-num">'+(i+1)+'</div>'+
    '<span>'+s.name+'</span>'+
    '<span class="count">'+s.count+'</span>'+
    '<span style="color:var(--green)">\u25CF '+s.status+'</span></div>'
  ).join('');
}

const es = new EventSource(API + 'events/stream');
es.addEventListener('dash', e => {
  try {
    const d = JSON.parse(e.data);
    applyStatus(d.status);
    applyPipeline(d.pipeline);
    if(d.logs && d.logs.length){
      const logEl = document.getElementById('logs');
      logEl.innerHTML = d.logs.slice(-50).map(l =>
        '<div class="log-line"><span class="ts">'+new Date(l.ts*1000).toLocaleTimeString('en-GB',{hour12:false})+'</span> '+
        '<span class="level-'+l.level.toLowerCase()+'">'+l.level+'</span> '+
        '<span style="color:var(--green)">['+l.source+']</span> '+
        l.msg+'</div>'
      ).join('');
    }
  } catch(_){}
});
es.onerror = () => {};
</script>
</body>
</html>
